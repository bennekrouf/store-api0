name: Build & Deploy — Store

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build & test ───────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Upload binary artifact
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: store-binary
          path: target/release/store
          retention-days: 3

  # ── Deploy (master push only) ──────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: store-binary
          path: dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload binary
        run: |
          chmod +x dist/store
          # /opt/api0/bin/ is owned by api0:api0; upload to home dir then sudo-move.
          scp -i ~/.ssh/deploy_key \
            dist/store \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/store.new
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "sudo mkdir -p /opt/api0/bin && sudo mv ~/store.new /opt/api0/bin/store.new && sudo chmod +x /opt/api0/bin/store.new"

      - name: Sync config.yaml
        run: |
          scp -i ~/.ssh/deploy_key \
            config.yaml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/store-config.yaml
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "sudo mkdir -p /opt/api0/store && sudo mv ~/store-config.yaml /opt/api0/store/config.yaml"

      - name: Atomic swap & restart
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "set -e
             sudo mv /opt/api0/bin/store.new /opt/api0/bin/store
             sudo pm2 restart api0-store
             sudo pm2 list"
